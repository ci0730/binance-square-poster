name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # 本地若已用 gh/electron-builder 发过同标签 Release，再上传会 422 already_exists。
      # 已有 .exe 时只打包校验，不再 publish。
      - name: Detect existing release assets
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" --json assets --jq '.assets[].name' 2>/dev/null | grep -Ei '\.exe$' >/dev/null; then
            echo "has_installer=true" >> "$GITHUB_OUTPUT"
            echo "Release $TAG already has an installer; will build without publish."
          else
            echo "has_installer=false" >> "$GITHUB_OUTPUT"
            echo "Release $TAG has no installer yet; will build and publish."
          fi

      - name: Build Windows installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_OUTPUT_DIR: release
          RELEASE_PUBLISH: ${{ steps.release.outputs.has_installer == 'true' && '0' || '1' }}
        run: npm run release:win

      - name: Upload build artifacts (backup)
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            release/*.exe
            release/latest.yml
          if-no-files-found: error
